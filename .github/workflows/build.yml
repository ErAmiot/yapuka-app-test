name: build.yml
on: workflow_dispatch

jobs:

    # ===========================================================================
    # Job : Build et push des images Docker vers GHCR
    # ===========================================================================
    build-images:
        name: Build Images Docker
        runs-on: ubuntu-latest

        permissions:
            contents: read
            packages: write

        # --- Ne builder que sur un push (pas sur les PR) ---
        # if: github.event_name == 'push'

        steps:
            -   name: test
                run: echo "Je suis un test"
            -   name: Checkout du code
                uses: actions/checkout@v6

            # --- Configurer Docker Buildx (builder amélioré) ---
            -   name: Setup Docker Buildx
                uses: docker/setup-buildx-action@v4

            # --- Se connecter au GitHub Container Registry ---
            -   name: Login GHCR
                uses: docker/login-action@v4
                with:
                    registry: ghcr.io
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}
            -   name: Lowercase owner
                id: lower
                run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

            -   run: echo ${{steps.lower.outputs.owner}}
            # --- Build et push de l'image backend ---
            -   name: Build & Push Backend
                uses: docker/build-push-action@v7
                with:
                    context: ./api
                    file: ./api/Dockerfile.prod
                    push: true
                    tags: |
                        ghcr.io/${{steps.lower.outputs.owner}}/${{ github.event.repository.name }}/backend:latest
                        ghcr.io/${{steps.lower.outputs.owner}}/${{ github.event.repository.name }}/backend:${{ github.sha }}
                    cache-from: type=gha
                    cache-to: type=gha,mode=max

            # --- Build et push de l'image frontend ---
            -   name: Build & Push Frontend
                uses: docker/build-push-action@v7
                with:
                    context: ./front
                    file: ./front/Dockerfile.prod
                    push: true
                    tags: |
                        ghcr.io/${{steps.lower.outputs.owner}}/${{ github.event.repository.name }}/frontend:latest
                        ghcr.io/${{steps.lower.outputs.owner}}/${{ github.event.repository.name }}/frontend:${{ github.sha }}
                    cache-from: type=gha
                    cache-to: type=gha,mode=max
