name: security-scan
on: workflow_dispatch

jobs:
  # =========================================================================
  # Job : Scan de sécurité des images Docker
  # =========================================================================
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest


    steps:
      - name: Checkout du code
        uses: actions/checkout@v6
      -   name: Lowercase owner
          id: lower
          run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      # --- Scanner l'image backend (bloque si vulnérabilité CRITICAL) ---
      - name: Scan image backend (critical)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/${{steps.lower.outputs.owner}}/${{ github.event.repository.name }}/backend:latest
          format: table
          severity: CRITICAL
          exit-code: '0'

      - name: Scan image backend (high)
        uses: aquasecurity/trivy-action@0.35.0
        if: always()
        with:
          image-ref: ghcr.io/${{steps.lower.outputs.owner}}/${{ github.event.repository.name }}/backend:latest
          format: table
          severity: HIGH
          exit-code: '0'

      # --- Scanner l'image frontend ---
      - name: Scan image frontend (critical)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/${{steps.lower.outputs.owner}}/${{ github.event.repository.name }}/frontend:latest
          format: table
          severity: CRITICAL
          exit-code: '0'

      - name: Scan image frontend (high)
        uses: aquasecurity/trivy-action@0.35.0
        if: always()
        with:
          image-ref: ghcr.io/${{steps.lower.outputs.owner}}/${{ github.event.repository.name }}/frontend:latest
          format: table
          severity: HIGH
          exit-code: '0'

      # --- Générer un rapport détaillé (ne bloque pas) ---
      - name: Rapport SARIF backend
        uses: aquasecurity/trivy-action@0.35.0
        if: always()
        with:
          image-ref: ghcr.io/${{steps.lower.outputs.owner}}/${{ github.event.repository.name }}/backend:latest
          format: sarif
          output: backend-trivy.sarif
          severity: CRITICAL,HIGH

      - name: Rapport SARIF frontend
        uses: aquasecurity/trivy-action@0.35.0
        if: always()
        with:
          image-ref: ghcr.io/${{steps.lower.outputs.owner}}/${{ github.event.repository.name }}/frontend:latest
          format: sarif
          output: frontend-trivy.sarif
          severity: CRITICAL,HIGH

      # --- Sauvegarder le rapport ---
      - name: Upload rapport de sécurité
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-reports
          path: "*.sarif"
